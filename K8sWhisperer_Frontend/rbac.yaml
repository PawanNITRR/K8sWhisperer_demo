apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8swhisperer-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-remediator-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  # Limits the agent to surgical pod actions only 
  verbs: ["get", "list", "watch", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8swhisperer-binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: k8swhisperer-sa
  namespace: default
roleRef:
  kind: Role
  name: pod-remediator-role
  apiGroup: rbac.authorization.k8s.io